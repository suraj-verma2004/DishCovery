<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Community | DishCovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; color: #2b3674; }
        .chat-container { max-width: 900px; margin: 30px auto; }
        .chat-card { border-radius: 35px; border: none; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        #chat-log { height: 500px; overflow-y: auto; background: #fff; padding: 25px; display: flex; flex-direction: column; }
        .msg { max-width: 75%; padding: 12px 18px; border-radius: 20px; margin-bottom: 15px; position: relative; }
        .msg-me { align-self: flex-end; background: #4318ff; color: white; border-bottom-right-radius: 5px; }
        .msg-other { align-self: flex-start; background: #f0f3ff; color: #2b3674; border-bottom-left-radius: 5px; }
        .user-name { font-size: 0.7rem; font-weight: 800; margin-bottom: 4px; display: block; text-transform: uppercase; }
        .input-area { background: white; padding: 20px; border-top: 1px solid #edf2f7; }
        .btn-send { width: 50px; height: 50px; border-radius: 50%; background: #4318ff; color: white; border: none; }
    </style>
</head>
<body>

<div class="container chat-container">
    <div class="mb-4 d-flex align-items-center">
        <a href="{% url 'dashboard' %}" class="btn btn-white rounded-circle shadow-sm me-3"><i class="fas fa-arrow-left"></i></a>
        <h3 class="fw-800 m-0">Foodie Community Chat</h3>
    </div>

    <div class="card chat-card">
        <div class="bg-primary p-3 text-white text-center fw-bold">
            <i class="fas fa-circle text-success small me-2 animate-pulse"></i> LIVE DISCUSSION
        </div>
        
        <div id="chat-log">
            <div class="text-center text-muted small my-3">Welcome to the real-time food hub!</div>
        </div>

        <div class="input-area">
            <div class="input-group">
                <input id="chat-message-input" type="text" class="form-control border-0 bg-light rounded-pill px-4" placeholder="Type a message...">
                <button id="chat-message-submit" class="btn-send ms-2"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatSocket = new WebSocket('ws://' + window.location.host + '/ws/chat/');

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const chatLog = document.querySelector('#chat-log');
        const isMe = data.user === '{{ request.user.username }}';
        
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
        div.innerHTML = `<span class="user-name ${isMe ? 'text-white-50' : 'text-primary'}">${data.user}</span>${data.message}`;
        
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    };

    document.querySelector('#chat-message-submit').onclick = function() {
        const input = document.querySelector('#chat-message-input');
        if(input.value.trim() !== "") {
            chatSocket.send(JSON.stringify({'message': input.value}));
            input.value = '';
        }
    };

    document.querySelector('#chat-message-input').onkeyup = function(e) {
        if (e.keyCode === 13) document.querySelector('#chat-message-submit').click();
    };
</script>
</body>
</html>
