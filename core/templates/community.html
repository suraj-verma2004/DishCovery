<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Community | DishCovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { --primary: #4318ff; --dark: #1b254b; --light: #f4f7fe; --bg-me: linear-gradient(135deg, #4318ff 0%, #5e35ff 100%); }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: #2b3674; height: 100vh; overflow: hidden; }
        
        .chat-container { max-width: 1000px; margin: 20px auto; height: 90vh; }
        .chat-card { border-radius: 40px; border: none; height: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.08); display: flex; flex-direction: column; background: white; }
        
        /* Chat Log Area */
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 30px; scroll-behavior: smooth; background: #fafbff; }
        #chat-log::-webkit-scrollbar { width: 6px; }
        #chat-log::-webkit-scrollbar-thumb { background: #e0e5f2; border-radius: 10px; }

        /* Messages */
        .msg { max-width: 65%; padding: 14px 20px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.3s; }
        
        .msg-me { 
            align-self: flex-end; background: var(--bg-me); color: white; 
            border-radius: 25px 25px 5px 25px; margin-left: auto;
        }
        
        .msg-other { 
            align-self: flex-start; background: white; color: #2b3674; 
            border-radius: 25px 25px 25px 5px; border: 1px solid #edf2f7;
        }

        .user-name { font-size: 0.75rem; font-weight: 800; margin-bottom: 5px; display: block; letter-spacing: 0.5px; }
        .msg-time { font-size: 0.65rem; opacity: 0.7; margin-top: 5px; display: block; text-align: right; }

        /* Input Area */
        .input-area { background: white; padding: 25px 35px; border-top: 1px solid #f1f4f9; }
        .input-group { background: #f4f7fe; border-radius: 30px; padding: 5px 5px 5px 20px; }
        #chat-message-input { background: transparent; border: none; font-weight: 600; color: var(--dark); }
        #chat-message-input:focus { box-shadow: none; }
        
        .btn-send { 
            width: 45px; height: 45px; border-radius: 50%; background: var(--primary); 
            color: white; border: none; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .btn-send:hover { transform: scale(1.1); box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2); }

        .animate-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container chat-container">
    <div class="mb-3 d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
            <a href="{% url 'dashboard' %}" class="btn btn-white rounded-circle shadow-sm me-3 bg-white">
                <i class="fas fa-arrow-left text-primary"></i>
            </a>
            <div>
                <h4 class="fw-800 m-0">Foodie Community</h4>
                <span class="small text-muted"><i class="fas fa-circle text-success small me-1"></i> Global Chatroom</span>
            </div>
        </div>
        <div class="dropdown">
            <button class="btn btn-light rounded-pill px-3 fw-bold small" type="button">
                {{ request.user.username }}
            </button>
        </div>
    </div>

    <div class="card chat-card">
        <div id="chat-log" class="d-flex flex-column">
            <div class="text-center my-4">
                <span class="badge bg-light text-muted rounded-pill px-3 py-2 fw-normal" style="font-size: 0.7rem;">
                    TODAY'S CONVERSATION STARTED
                </span>
            </div>
            </div>

        <div class="input-area">
            <div class="input-group shadow-sm">
                <input id="chat-message-input" type="text" class="form-control px-2" placeholder="Share a recipe or food tip...">
                <button id="chat-message-submit" class="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const ws_scheme = window.location.protocol === "https:" ? "wss" : "ws";
    const chatSocket = new WebSocket(
        ws_scheme + '://' + window.location.host + '/ws/chat/'
    );

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const chatLog = document.querySelector('#chat-log');
        const currentUser = '{{ request.user.username }}';
        const isMe = data.user === currentUser;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
        
        // Get current time
        const now = new Date();
        const timeStr = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();

        msgDiv.innerHTML = `
            <span class="user-name ${isMe ? 'text-white-50' : 'text-primary'}">
                ${isMe ? 'You' : data.user}
            </span>
            <div class="msg-content">${data.message}</div>
            <span class="msg-time">${timeStr}</span>
        `;
        
        chatLog.appendChild(msgDiv);
        chatLog.scrollTop = chatLog.scrollHeight;
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed unexpectedly');
    };

    document.querySelector('#chat-message-submit').onclick = function() {
        const input = document.querySelector('#chat-message-input');
        if(input.value.trim() !== "") {
            chatSocket.send(JSON.stringify({'message': input.value}));
            input.value = '';
        }
    };

    document.querySelector('#chat-message-input').onkeyup = function(e) {
        if (e.keyCode === 13) document.querySelector('#chat-message-submit').click();
    };
</script>

</body>
</html>
