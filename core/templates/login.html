<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DishCovery Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --primary: #4318ff; --dark: #1b254b; --light: #f4f7fe; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f4f7fe 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            margin: auto;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 45px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .logo-box {
            width: 65px; height: 65px;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.25);
            transform: rotate(-8deg);
        }

        .form-label { font-weight: 700; font-size: 0.8rem; color: #a3aed0; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }

        .form-control {
            border-radius: 18px;
            padding: 14px 20px;
            background: #f8fafc;
            border: 2px solid #edf2f7;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.05);
            outline: none;
        }

        .btn-login {
            background: var(--primary);
            border: none;
            border-radius: 20px;
            padding: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(67, 24, 255, 0.25);
            color: white;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #3311db;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(67, 24, 255, 0.35);
            color: white;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid #feb2b2;
            padding: 12px;
        }

        @media (max-width: 576px) {
            .auth-card { padding: 35px 25px; border-radius: 35px; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-box">
                <i class="fas fa-lock"></i>
            </div>
            
            <h3 class="text-center fw-800 mb-2">Welcome Back!</h3>
            <p class="text-center text-muted small mb-4">Access your Intelligence Dashboard.</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-error mb-4 animate__animated animate__shakeX">
                        <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="position-relative">
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100 mb-4">
                    SIGN IN <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>

            <div class="text-center">
                <p class="text-muted small mb-2">Don't have an account?</p>
                <a href="{% url 'register' %}" class="text-primary fw-800 text-decoration-none small">CREATE NEW IDENTITY</a>
                <br>
                <a href="{% url 'dashboard' %}" class="text-muted text-decoration-none x-small mt-3 d-inline-block">
                    <i class="fas fa-chevron-left me-1"></i> Back to Home
                </a>
            </div>
        </div>
        
        <p class="text-center mt-4 text-muted small opacity-50">
            DishCovery Intelligence Sec-Layer v2.0
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
