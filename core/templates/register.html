<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join DishCovery | AI Food Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --primary: #4318ff; --dark: #1b254b; --light: #f4f7fe; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f4f7fe 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .logo-circle {
            width: 70px; height: 70px;
            background: var(--primary);
            color: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.3);
            transform: rotate(-10deg);
        }

        .form-label { font-weight: 700; font-size: 0.85rem; color: #a3aed0; margin-left: 5px; }

        .form-control {
            border-radius: 18px;
            padding: 14px 20px;
            background: #f8fafc;
            border: 2px solid #edf2f7;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.05);
        }

        /* Django Form Customization Hack */
        .mb-3 p { margin-bottom: 15px; }
        .mb-3 p label { display: block; font-weight: 700; font-size: 0.85rem; color: #a3aed0; margin-bottom: 5px; }
        .mb-3 p input { 
            width: 100%; border-radius: 18px; padding: 14px 20px; 
            background: #f8fafc; border: 2px solid #edf2f7; font-weight: 600; 
        }

        .btn-register {
            background: var(--primary);
            border: none;
            border-radius: 20px;
            padding: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(67, 24, 255, 0.2);
        }

        .btn-register:hover {
            background: #3311db;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(67, 24, 255, 0.3);
        }

        .alert-custom {
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
        }

        @media (max-width: 576px) {
            .auth-card { padding: 30px 20px; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="auth-card">
            <div class="logo-circle">
                <i class="fas fa-brain"></i>
            </div>
            
            <h3 class="text-center fw-800 mb-2">Join DishCovery</h3>
            <p class="text-center text-muted small mb-4">Start your AI-powered food journey today.</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger alert-custom mb-4">
                        <i class="fas fa-circle-exclamation me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    {{ form.as_p }}
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-map-marker-alt me-1"></i> HOME CITY</label>
                    <input type="text" 
                           name="home_city" 
                           class="form-control" 
                           placeholder="e.g. Prayagraj" 
                           required>
                    <div class="form-text small opacity-75 ms-2">Your main intelligence hub.</div>
                </div>

                <button type="submit" class="btn btn-primary btn-register w-100 mb-4">
                    CREATE ACCOUNT <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center">
                <p class="text-muted small mb-0">Already an explorer?</p>
                <a href="{% url 'login' %}" class="text-primary fw-800 text-decoration-none small">LOGIN TO YOUR PORTAL</a>
            </div>
        </div>
        
        <p class="text-center mt-4 text-muted small">
            &copy; 2026 DishCovery Intelligence Network
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
